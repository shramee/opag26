[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
# 0G Newton Testnet (chain ID 16600)
og_testnet = "${RPC_URL}"

[etherscan]
# 0G testnet block explorer — used for contract verification
og_testnet = { key = "${OG_ETHERSCAN_API_KEY}", url = "${OG_EXPLORER_URL}" }
